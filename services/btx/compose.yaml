services:
  ingestion:
    labels:
      - traefik.enable=false
      - wud.watch=true
      - wud.watch.digest=true
    image: 172.20.0.52:5000/btx:latest
    container_name: btx-ingestion
    restart: unless-stopped
    env_file:
      - .env
    command:
      - btx
      - ingest
    networks:
      homelab-network: null
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1G
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import btx; print('ok')
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
  ib-gateway:
    labels:
      - traefik.enable=false
      - wud.watch=true
      - wud.tag.include=^\d+\.\d+\.\d+[a-z]?$
    image: ghcr.io/gnzsnz/ib-gateway:10.43.1c
    container_name: btx-ib-gateway
    restart: unless-stopped
    environment:
      TWS_USERID: ${IBKR_USERNAME}
      TWS_PASSWORD: ${IBKR_PASSWORD}
      TRADING_MODE: ${IBKR_TRADING_MODE:-paper}
      TWS_SETTINGS_PATH: /home/ibgateway/tws_settings
      READ_ONLY_API: no
      TWOFA_TIMEOUT_ACTION: ${IBKR_TWOFA_TIMEOUT_ACTION:-restart}
      RELOGIN_AFTER_TWOFA_TIMEOUT: ${IBKR_RELOGIN_AFTER_TWOFA_TIMEOUT:-yes}
      AUTO_RESTART_TIME: ${IBKR_AUTO_RESTART_TIME:-11:59 PM}
      EXISTING_SESSION_DETECTED_ACTION: ${IBKR_EXISTING_SESSION_DETECTED_ACTION:-primary}
    volumes:
      - ib_gateway_settings:/home/ibgateway/tws_settings
      - ib_ibc_state:/home/ibgateway/ibc
    networks:
      homelab-network:
        ipv4_address: 172.20.0.60
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
    healthcheck:
      test:
        - CMD-SHELL
        - bash -c 'echo > /dev/tcp/localhost/4002'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
volumes:
  ib_gateway_settings:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/quick/apps/volumes/btx/ib-gateway/settings
  ib_ibc_state:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/quick/apps/volumes/btx/ib-gateway/ibc
networks:
  homelab-network:
    external: true
